name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IDF_VERSION: v5.3

jobs:
  # Go Core Build and Test
  go-build:
    name: Go Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: core/go/go.sum
      
      - name: Build Go
        run: |
          cd core/go
          go build ./...
      
      - name: Test Go
        run: |
          cd core/go
          go test ./...

  # ESP32 Firmware Build
  esp32-build:
    name: ESP32 Firmware
    runs-on: ubuntu-latest
    container: espressif/idf:${{ env.IDF_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Build ESP32 Firmware
        run: |
          . /opt/esp/idf/export.sh
          cd firmware/esp32
          idf.py build
      
      - name: Upload ESP32 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            firmware/esp32/build/*.bin
            firmware/esp32/build/bootloader/bootloader.bin
            firmware/esp32/build/partition_table/partition-table.bin
          retention-days: 30
          if-no-files-found: warn

  # Android App Build
  android-build:
    name: Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
      
      - name: Run Android Tests
        run: |
          cd android
          ./gradlew :app:testDebugUnitTest
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn
