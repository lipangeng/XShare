name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IDF_VERSION: v5.3

jobs:
  # Go Core Build and Test
  go-build:
    name: Go Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      
      - name: Build Go
        run: |
          cd core/go
          go version
          go build ./...
      
      - name: Test Go
        run: |
          cd core/go
          go test ./...

  # ESP32 Firmware Build
  esp32-build:
    name: ESP32 Firmware
    runs-on: ubuntu-latest
    container: espressif/idf:${{ env.IDF_VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Check ESP-IDF
        run: |
          . /opt/esp/idf/export.sh
          echo "IDF_PATH: $IDF_PATH"
          idf.py --version
      
      - name: Build ESP32 Firmware
        run: |
          . /opt/esp/idf/export.sh
          cd firmware/esp32
          idf.py fullclean
          idf.py build
      
      - name: Check build outputs
        run: |
          ls -la firmware/esp32/build/
          ls -la firmware/esp32/build/bootloader/
          ls -la firmware/esp32/build/partition_table/
      
      - name: Upload ESP32 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            firmware/esp32/build/*.bin
            firmware/esp32/build/bootloader/bootloader.bin
            firmware/esp32/build/partition_table/partition-table.bin
          retention-days: 30
          if-no-files-found: error

  # Android App Build
  android-build:
    name: Android App
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools,platforms;android-35,build-tools;35.0.0,ndk;27.0.12077973,cmake;3.22.1'
      
      - name: Copy Android licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          cp -r android/licenses/* $ANDROID_HOME/licenses/
      
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew
      
      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Run Android Tests
        run: |
          cd android
          ./gradlew :app:testDebugUnitTest --no-daemon
      
      - name: Check APK output
        run: |
          ls -la android/app/build/outputs/apk/debug/
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
