syntax = "proto3";

package xshare.data.v1;

option go_package = "xshare/protocol/gen/go/data/v1;datav1";

message DataChunk {
  string transfer_id = 1;
  uint64 sequence = 2;
  bytes payload = 3;
  bool final_chunk = 4;
}

message DataAck {
  string transfer_id = 1;
  uint64 next_expected_sequence = 2;
}
